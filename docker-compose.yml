# Local development / single-host deployment for the AP Automation Platform.
# Mirrors the Azure Container Apps topology: api + worker + beat share one image
# and one uploads volume; Postgres and Redis run as sidecars locally.
#
#   cp .env.example .env   # then set OPENAI_API_KEY
#   docker compose up --build -d
#   docker compose exec backend alembic upgrade head
#   docker compose exec backend python seed/seed.py

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-appassword}
      POSTGRES_DB: ${POSTGRES_DB:-ap_platform}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apuser} -d ${POSTGRES_DB:-ap_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redispassword}"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      UPLOAD_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      UPLOAD_DIR: /app/uploads
    command: ["celery", "-A", "app.core.celery_app.celery_app", "worker", "--loglevel=info", "-Q", "pipeline,default", "--concurrency=4"]
    depends_on:
      - backend
    volumes:
      - uploads:/app/uploads

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    command: ["celery", "-A", "app.core.celery_app.celery_app", "beat", "--loglevel=info"]
    depends_on:
      - redis
    volumes:
      - uploads:/app/uploads

  flower:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    command: ["celery", "-A", "app.core.celery_app.celery_app", "flower", "--port=5555"]
    depends_on:
      - redis
    ports:
      - "5555:5555"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
