      "gstin": null,
      "pan": null,
      "vat_number": null,
      "tax_id": null,
      "address": null,
      "country": null,
      "bank_name": null,
      "bank_account": null,
      "bank_ifsc": null,
      "bank_swift": null,
      "bank_iban": null,
      "email": null,
      "phone": null
